on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

name: Test GitHub App authentication

permissions:
  id-token: write
  contents: write

jobs:
  github_app_auth_test_client_1:
    runs-on: ubuntu-latest
    name: GitHub App authentication test (client 1)
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex with GitHub App
        uses: ./
        with:
          ticket-id-suffix: "client-1"
          github-app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          github-app-private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          branch: gh-mutex-app-auth-test
          token-refresh-interval: 30 # 1 minute for testing purposes
      - name: Simulate long-running task to test token refresh
        run: |
          echo "I am protected via GitHub App auth! Waiting for 45 seconds to test token expiration handling..."
          sleep 45

  github_app_auth_test_client_2:
    runs-on: ubuntu-latest
    name: GitHub App authentication test (client 2)
    steps:
      - uses: actions/checkout@v6
      - run: |
          echo "Simulated concurrent client acquiring lock with GitHub App auth. Waiting for 5 seconds to let the first client acquire the lock..."
          sleep 5
      - name: Set up mutex with GitHub App
        uses: ./
        with:
          ticket-id-suffix: "client-2"
          github-app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          github-app-private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          branch: gh-mutex-app-auth-test
          token-refresh-interval: 30 # 1 minute for testing purposes
      - name: Simulate long-running task to test token refresh
        run: |
          echo "I am protected via GitHub App auth! Waiting for 10 seconds to test token expiration handling..."
          sleep 10
