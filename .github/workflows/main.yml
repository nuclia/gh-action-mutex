on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  simple_test:
    runs-on: ubuntu-latest
    name: Simple mutex test
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex
        uses: ./
      - run: |
          echo "I am protected!"
          sleep 5

  two_clients_test_client_1:
    runs-on: ubuntu-latest
    name: Two clients test (client 1)
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex
        uses: ./
        with:
          branch: gh-mutex-two-clients-test
          mutex-key: client-1
      - run: |
          echo "I am protected! (Client 1)"
          sleep 20

  two_clients_test_client_2:
    runs-on: ubuntu-latest
    name: Two clients test (client 2)
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex
        uses: ./
        with:
          branch: gh-mutex-two-clients-test
          mutex-key: client-2
      - run: |
          echo "I am protected! (Client 2)"
          sleep 20

  debug_test:
    runs-on: ubuntu-latest
    name: Test the debug flag
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex
        uses: ./
        with:
          debug: "true"
      - run: |
          echo "I am protected!"
          sleep 5

  simple_test_custom_lock:
    runs-on: ubuntu-latest
    name: Mutex test with custom lock and skip post-execution
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex
        uses: ./
        with:
          mutex-key: "custom-lock"
          branch: gh-mutex-custom-lock-test
          run-post-execution: "false"
      - run: |
          echo "I am protected!"
          sleep 5

  simple_test_custom_unlock:
    runs-on: ubuntu-latest
    name: Test unlocking a custom lock
    needs: [simple_test_custom_lock]
    steps:
      - uses: actions/checkout@v6
      - name: Release up mutex
        uses: ./
        with:
          mutex-key: "custom-lock"
          branch: gh-mutex-custom-lock-test
          operation: unlock
          run-post-execution: "false"
      - run: |
          echo "I am protected!"
          sleep 5

  simple_test_github_token_test:
    runs-on: ubuntu-latest
    name: Mutex test with GitHub Token authentication
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - name: Generate Github Token
        id: app-token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia

      - name: Set up mutex
        uses: ./
        with:
          mutex-key: "token-lock"
          repo-token: ${{ steps.app-token.outputs.token }}
          branch: gh-mutex-token-auth-test
      - name: Simulate long-running task to test token refresh
        run: |
          echo "I am protected!"
          sleep 5

  github_app_auth_test_client_1:
    runs-on: ubuntu-latest
    name: GitHub App authentication test (client 1)
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up mutex with GitHub App
        uses: ./
        with:
          ticket-id-suffix: "client-1"
          github-app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          github-app-private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          branch: gh-mutex-app-auth-test
          token-refresh-interval: 30 # 1 minute for testing purposes
      - name: Simulate long-running task to test token refresh
        run: |
          echo "I am protected via GitHub App auth! Waiting for 45 seconds to test token expiration handling..."
          sleep 45

  github_app_auth_test_client_2:
    runs-on: ubuntu-latest
    name: GitHub App authentication test (client 2)
    needs: [simple_test]
    steps:
      - uses: actions/checkout@v6
      - run: |
          echo "Simulated concurrent client acquiring lock with GitHub App auth. Waiting for 5 seconds to let the first client acquire the lock..."
          sleep 5
      - name: Set up mutex with GitHub App
        uses: ./
        with:
          ticket-id-suffix: "client-2"
          github-app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          github-app-private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          branch: gh-mutex-app-auth-test
          token-refresh-interval: 30 # 1 minute for testing purposes
      - name: Simulate long-running task to test token refresh
        run: |
          echo "I am protected via GitHub App auth! Waiting for 10 seconds to test token expiration handling..."
          sleep 10
