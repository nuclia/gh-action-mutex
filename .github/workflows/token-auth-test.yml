on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

name: Test GitHub Token authentication

permissions:
  id-token: write
  contents: write

jobs:
  simple_test_github_token_test:
    runs-on: ubuntu-latest
    name: Mutex test with GitHub Token authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate Github Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia

      - name: Set up mutex
        uses: ./
        with:
          mutex-key: "token-lock"
          repo-token: ${{ steps.app-token.outputs.token }}
          branch: gh-mutex-token-auth-test
      - name: Simulate long-running task to test token refresh
        run: |
          echo "I am protected!"
          sleep 5
