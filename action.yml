# action.yml
name: 'Mutex Action'
branding:
  icon: 'lock'
  color: 'black'
description: 'A simple locking/unlocking mechanism to provide mutual exclusion in Github Actions'
inputs:
  repo-token:
    description: 'The token for accessing the repo.'
    required: false
    default: ${{ github.token }}
  github_server:
    description: 'The GitHub server URL without `https`. This might be useful for e.g. GHES'
    required: false
    default: github.com
  repository:
    description: 'The repository path that stores the lock. E.g `ben-z/gh-action-mutex`'
    required: false
    default: ${{ github.repository }}
  branch:
    description: 'The branch to use for the mutex'
    required: false
    default: 'gh-mutex'
  debug:
    description: 'Print debug output'
    required: false
    default: "false"
  internal_checkout-location:
    description: '[Internal] The location to store the mutex repo'
    required: false
    default: ''
  ticket-id-suffix:
    description: 'Ticket id suffix to avoid identical values for parallel/matrix jobs in the same workflow run'
    required: false
    default: 'default'
  operation:
    description: 'The operation to perform: lock or unlock'
    required: false
    default: 'lock'
  run-post-execution:
    description: "If true and the main operation is 'lock', runs the post-job action to unlock the mutex"
    required: false
    default: 'true'
  mutex-key:
    description: 'The mutex key to use for the lock. If not set, a default key will be used.'
    required: false
    default: 'default'
  github-app-id:
    description: 'GitHub App ID for authentication. Use together with github-app-private-key instead of repo-token.'
    required: false
    default: ''
  github-app-private-key:
    description: 'GitHub App private key (PEM format) for authentication. Use together with github-app-id.'
    required: false
    default: ''
  github-app-installation-id:
    description: 'GitHub App installation ID. If not provided, it will be auto-detected from the repository.'
    required: false
    default: ''
  token-refresh-interval:
    description: 'Compatibility input from the Docker implementation. GitHub App tokens are refreshed before remote git operations.'
    required: false
    default: '2700'
runs:
  using: 'node24'
  main: 'src/index.js'
  post: 'src/post.js'
